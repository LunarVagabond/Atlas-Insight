x-glitchtip-env: &glitchtip-env
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-changeme-glitchtip-dev-secret}
  DATABASE_URL: postgresql://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas_secret}@postgres:5432/glitchtip
  REDIS_URL: redis://redis:6379/2
  PORT: 8080
  EMAIL_URL: consolemail://
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:4505}
  # No GitHub OAuth for GlitchTip — email/password only.
  # ENABLE_USER_REGISTRATION=False blocks allauth signup (is_open_for_signup returns False).
  # Admin adds users via GlitchTip: Organizations → Members → Invite.
  ENABLE_USER_REGISTRATION: "False"
  USE_X_FORWARDED_HOST: "True"
  SECURE_PROXY_SSL_HEADER: "HTTP_X_FORWARDED_PROTO,https"
  CSRF_TRUSTED_ORIGINS: ${GLITCHTIP_CSRF_TRUSTED_ORIGINS:-https://glitch.dsyndicate.dev,http://localhost:4505}
  # False: Cloudflare/nginx terminates TLS; the container only ever sees HTTP internally.
  SESSION_COOKIE_SECURE: "False"
  CSRF_COOKIE_SECURE: "False"
  SESSION_COOKIE_SAMESITE: "Lax"
  CSRF_COOKIE_SAMESITE: "Lax"
  CELERY_WORKER_CONCURRENCY: 2

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "4503:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas_insight}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-glitchtip-db.sql:/docker-entrypoint-initdb.d/02-glitchtip.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "4502:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    ports:
      - "4505:8080"
    environment:
      <<: *glitchtip-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - glitchtip

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    environment:
      <<: *glitchtip-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - glitchtip

  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-migrate.sh
    environment:
      <<: *glitchtip-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - glitchtip

  # ── App services (profile: app) ───────────────────────────────────────────────
  # Use: docker compose --profile app up -d
  # All services share the backend image; only CMD differs for celery/flower.

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4500:4500"
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - repo_cache:/app/_running/repo_cache
      - static_files:/app/staticfiles
    restart: unless-stopped
    profiles:
      - app

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config worker --loglevel=info
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ATLAS_SERVICE: celery-workers
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - backend
    volumes:
      - repo_cache:/app/_running/repo_cache
    restart: unless-stopped
    profiles:
      - app

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ATLAS_SERVICE: celery-beat
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - app

  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config flower --port=4504
    ports:
      - "4504:4504"
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      ATLAS_SERVICE: celery-flower
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - app

  frontend:
    build: ./frontend
    ports:
      - "4501:80"
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - app

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # host network so the tunnel can reach Django/Vite/Flower on localhost ports
    network_mode: host
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel

volumes:
  postgres_data:
  redis_data:
  repo_cache:
  static_files:
