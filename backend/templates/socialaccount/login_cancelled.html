{% load i18n %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Cancelled — Atlas Insight</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fa;
        --surface: #ffffff;
        --border: #d0d7de;
        --text: #1f2328;
        --text-secondary: #656d76;
        --accent: #0969da;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wordmark {
      margin-bottom: 28px;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .icon { font-size: 32px; margin-bottom: 16px; }

    .card__title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card__subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn--primary {
      background: var(--accent);
      border: none;
      color: #fff;
    }

    .btn--secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <a href="/" class="wordmark">Atlas Insight</a>

  <div class="card">
    <div class="icon">✕</div>
    <h1 class="card__title">Login cancelled</h1>
    <p class="card__subtitle">You cancelled the GitHub sign-in. You can try again or continue browsing without an account.</p>
    <div class="actions">
      <a href="/accounts/github/login/" class="btn btn--primary">Try again</a>
      <a href="/" class="btn btn--secondary">Continue without signing in</a>
    </div>
  </div>

</body>
</html>
