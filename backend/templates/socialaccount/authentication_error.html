{% extends "status/base.html" %}

{% block title %}Sign-In Error | {{ site_name }}{% endblock %}

{% block content %}
  <h1 class="danger">Sign-In Failed</h1>
  <p class="muted">GitHub authentication did not complete. You can retry, return home, or go back.</p>
{% endblock %}

{% block actions %}
  <a href="/accounts/github/login/" class="btn">Try Again</a>
{% endblock %}
